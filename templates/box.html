<!doctype html>
<html lang="en" style="--accent: $accent; --accent-soft: $accent_soft">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="$accent">
  <title>$page_title</title>
  <link rel="stylesheet" href="../assets/box.css">
  <script src="../assets/box-search.js" defer></script>
</head>
<body>
  <div class="accent-rule" aria-hidden="true"></div>
  <header class="page-header">
    <p class="box-identity"><strong>$box_id</strong><span>$color_name box</span></p>
    <h1>$title</h1>
    <p class="purpose">Complete inventory for this sealed box.</p>
    <ul class="metadata" aria-label="Box details">
      $metadata_html
    </ul>
  </header>

  <main>
    <div class="search-region" role="search">
      <label for="box-search">Search this box</label>
      <input id="box-search" type="search" placeholder="Try “wrench” or a category" autocomplete="off" spellcheck="false">
      <p id="result-count" class="result-count" aria-live="polite">$item_count items shown</p>
    </div>

    <div id="inventory" class="inventory-grid">
      $categories_html
    </div>
    <p id="empty-results" class="empty-results" hidden>No matching items in this box</p>
  </main>

  <footer>
    <a href="../index.html">← Back to all boxes</a>
    <p>Verified against the sealed-box inventory on $verified_date.</p>
  </footer>
</body>
</html>
